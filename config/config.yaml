# Reverse Arbitrage Bot - YAML Configuration
# Precedence: Defaults < YAML < Environment Variables < Fly Secrets

version: "1.0.0"
environment: "production"

# =============================================================================
# TRADING MODE
# =============================================================================
trading_mode:
  paper_trading: true
  environment: "production"
  live_trading_confirmed: false

# =============================================================================
# REVERSE ARBITRAGE STRATEGY
# =============================================================================
reverse_arb:
  enabled: true
  btc_only_focus: true
  eth_only_focus: false
  hft_mode: true
  dry_run: true

  # Market selection
  minutes_before_close_min: 2
  minutes_before_close_max: 5
  scan_interval_seconds: 5

  # Price windows
  cheap_buy_min: 0.065
  cheap_buy_max: 0.105
  expensive_buy_min: 0.90
  expensive_buy_max: 0.95

  # Order sizing (USDC)
  cheap_order_usd: 50
  expensive_order_usd: 100

  # Execution
  order_type: "FOK"

  # Edge & risk
  min_edge_bps: 100
  max_slippage_bps: 50
  max_position_usd: 2000
  fee_bps: 75

# =============================================================================
# EXECUTION
# =============================================================================
execution:
  mode: "paper"  # paper | live
  order_timeout_ms: 30000
  max_retries: 3
  retry_backoff_ms: 250
  default_order_type: "FOK"
  idempotency_window_seconds: 60

# =============================================================================
# MARKET DATA
# =============================================================================
market_data:
  gamma_api_url: "https://gamma-api.polymarket.com"
  clob_api_url: "https://clob.polymarket.com"
  clob_ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  polygon_rpc_url: "https://polygon-rpc.com"

  # WebSocket settings
  ws_reconnect_max_attempts: 10
  ws_reconnect_base_delay_sec: 1.0
  ws_reconnect_max_delay_sec: 30.0
  ws_heartbeat_interval_sec: 20
  ws_token_batch_size: 50

# =============================================================================
# SCAN SETTINGS
# =============================================================================
scan:
  # Batch scanner (non-HFT mode)
  batch_scan_interval_sec: 5
  max_markets_per_batch: 100

  # HFT detector
  hft_enabled: true
  hft_max_orderbook_age_ms: 100
  hft_callback_throttle_ms: 50

# =============================================================================
# LIQUIDITY REQUIREMENTS
# =============================================================================
liquidity:
  min_book_depth_usd: 100
  min_top3_levels_usd: 500
  require_both_sides: true
  max_spread_bps: 200

# =============================================================================
# RISK LIMITS
# =============================================================================
risk_limits:
  # Per strategy
  reverse_arb:
    max_position_usd: 2000
    max_slippage_bps: 50
    max_latency_ms: 100
    max_daily_loss_usd: 500
    max_concurrent_positions: 5

  # Global
  global:
    max_gross_exposure_usd: 10000
    max_daily_loss_usd: 500
    max_drawdown_pct: 0.10
    circuit_breaker_daily_drawdown_pct: 0.05
    kelly_max_fraction: 0.25

# =============================================================================
# MONITORING
# =============================================================================
monitoring:
  metrics_port: 9090
  log_level: "INFO"
  structured_logging: true
  health_check_interval_sec: 30

# =============================================================================
# API SERVER
# =============================================================================
api:
  host: "0.0.0.0"
  port: 8080
  enabled: true
  cors_origins:
    - "https://*.fly.dev"
    - "http://localhost:*"

# =============================================================================
# DATABASE
# =============================================================================
database:
  url: "sqlite:///./data/arbitrage.db"
  pool_size: 5
  max_overflow: 10

redis:
  url: "redis://localhost:6379/0"
  db: 0

# =============================================================================
# KELLY SIZING (Dynamic)
# =============================================================================
kelly:
  drawdown_scaling: true
  max_drawdown_pct: 0.15
  drawdown_recovery_pct: 0.05
  volatility_scaling: true
  max_volatility_factor: 2.0
  streak_awareness: true
  losing_streak_threshold: 3
  winning_streak_threshold: 5
